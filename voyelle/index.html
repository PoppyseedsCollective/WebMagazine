<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOYELLE</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@300;400&family=Inter:wght@200;300&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0A0A0A;
    color: #F5F3EF;
    font-family: 'EB Garamond', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 60px;
  }

  .top {
    max-width: 600px;
    opacity: 0;
    animation: fade 2s ease forwards;
  }

  .top small {
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    letter-spacing: 0.15em;
    font-size: 11px;
    opacity: 0.6;
  }

  .top h1 {
    font-size: 42px;
    font-weight: 300;
    line-height: 1.3;
    margin-top: 20px;
  }

  .center {
    text-align: center;
    font-size: 120px;
    line-height: 0.9;
    letter-spacing: 0.2em;
    font-weight: 300;
    opacity: 0;
    animation: fade 3s ease forwards;
    animation-delay: 0.5s;
  }

  .center span {
    display: block;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: 'Inter', sans-serif;
    font-weight: 200;
    font-size: 13px;
    opacity: 0;
    animation: fade 3s ease forwards;
    animation-delay: 1s;
  }

  .bottom div {
    max-width: 300px;
    line-height: 1.6;
  }

  .cta {
    text-align: right;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }

  .cta:hover {
    opacity: 0.6;
  }

  @keyframes fade {
    to {
      opacity: 1;
    }
  }

  @media (max-width: 768px) {
    body {
      padding: 30px;
    }

    .center {
      font-size: 70px;
    }

    .top h1 {
      font-size: 28px;
    }

    .bottom {
      flex-direction: column;
      gap: 30px;
    }

    .cta {
      text-align: left;
    }
  }
</style>
</head>

<body>

<div class="top">
  <small>A practice of perception</small>
  <h1>
    We do not predict.<br>
    We describe what insists on being seen.
  </h1>
</div>

<div class="center">
  <span>VO</span>
  <span>YE</span>
  <span>LLE</span>
</div>

<div class="bottom">
  <div>
    Consultations<br>
    Objects<br>
    Correspondences
    <br><br>
    Divination through dialogue.<br>
    Personal charms composed and charged.
  </div>

  <div class="cta">
    Begin a conversation →
  </div>
</div>

</body>
</html>
