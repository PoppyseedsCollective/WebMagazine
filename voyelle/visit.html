<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card</title>

<style>
  html, body {
    all: initial;
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0f0f0e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: serif;
    color: #d6d2c8;
  }

  * {
    all: unset;
    box-sizing: border-box;
  }

  .card {
    width: 320px;
    height: 420px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
    color: #d6d2c8;
  }

  .glyph {
    font-size: 28px;
    letter-spacing: 0.4em;
    text-align: center;
    text-shadow:
      0 1px 0 rgba(255,255,255,0.05),
      0 -1px 1px rgba(0,0,0,0.6);
  }

  .top, .bottom {
    font-size: 10px;
    opacity: 0.6;
  }

</style>
</head>

<body>

<div class="card">

  <div class="top">A practice of perception</div>

  <div class="glyph">YL</div>
  <div class="glyph">AE</div>
  <div class="glyph">ON</div>

  <div class="bottom">
    Consultations<br>
    Objects<br>
    Correspondences
  </div>

</div>

</body>
</html>
