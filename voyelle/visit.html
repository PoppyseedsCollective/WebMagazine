<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0f0f0e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: serif;
    color: #d6d2c8;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.15;
    pointer-events: none;
  }

  .card {
    width: 420px;   /* ↑ was 320px */
    height: 540px;   /* ↑ was 420px */
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 60px;   /* ↑ more breathing space */
  }

  .top {
    font-size: 11px; /* slightly bigger */
    letter-spacing: 0.22em;
    opacity: 0.55;
  }

  .center {
    text-align: center;
  }

  .glyph {
    font-size: 34px;  /* ↑ was 28px */
    letter-spacing: 0.45em;
    font-weight: 300;
    color: #d6d2c8;
    text-shadow:
      0 1px 0 rgba(255,255,255,0.05),
      0 -1px 1px rgba(0,0,0,0.6);
    margin: 6px 0;
  }

  .bottom {
    font-size: 12px;  /* slightly bigger */
    line-height: 1.6;
    opacity: 0.7;
  }

</style>
</head>

<body>

<div class="card">

  <div class="top">
    A practice of perception
  </div>

  <div class="center">
    <div class="glyph">YL</div>
    <div class="glyph">AE</div>
    <div class="glyph">ON</div>
  </div>

  <div class="bottom">
    Consultations<br>
    Objects<br>
    Correspondences
  </div>

</div>

</body>
</html>
