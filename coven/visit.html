<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <circle cx='50' cy='50' r='22' fill='%23c8a85a'/>
</svg>">

<meta charset="UTF-8">
<title>Coven</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0f0f0e;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'EB Garamond', serif;
    color: #d6d2c8;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.15;
    pointer-events: none;
  }

  .card {
    width: 320px;
    height: 420px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
  }

  .top {
    font-size: 10px;
    letter-spacing: 0.2em;
    opacity: 0.5;
    line-height: 1.6;
    text-align: center;
  }

  .center {
    text-align: center;
    line-height: 1.4;
    cursor: pointer;
    user-select: none;
  }

  .glyph {
    font-size: 28px;
    letter-spacing: 0.4em;
    font-weight: 300;
    color: #cfcbbf;
    text-shadow:
      0 1px 0 rgba(255,255,255,0.05),
      0 -1px 1px rgba(0,0,0,0.6);
    margin: 6px 0;
  }

  .bottom {
    font-size: 11px;
    line-height: 1.6;
    opacity: 0.7;
    text-align: center;
  }

  /* selection = disappearance */
  ::selection {
    background: #000;
    color: #000;
  }

</style>
</head>

<body>

<div class="card">

  <!-- ONLY TEXT CHANGED (structure preserved) -->
  <div class="top">
    Consultations<br>
    Charm<br>
    Correspondences
  </div>

  <!-- SAME STRUCTURE -->
  <div class="center" id="glyph-container">
    <div class="glyph">RM</div>
    <div class="glyph">AE</div>
    <div class="glyph">MN</div>
  </div>

  <div class="bottom">
    +32 XXX XX XX XX<br>
    We respond only to written messages.
  </div>

</div>

<script>
  const glyphEls = document.querySelectorAll(".glyph");
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

  function randomFragment() {
    const len = Math.random() < 0.5 ? 2 : 3; // 2 or 3 letters

    let out = "";
    for (let i = 0; i < len; i++) {
      out += letters[Math.floor(Math.random() * letters.length)];
    }
    return out;
  }

  function shuffleGlyphs() {
    glyphEls.forEach(el => {
      el.textContent = randomFragment();
    });
  }

  // on load
  shuffleGlyphs();

  // only glyph area clickable
  document.getElementById("glyph-container").addEventListener("click", shuffleGlyphs);
</script>

</body>
</html>
