<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <circle cx='50' cy='50' r='22' fill='%23c8a85a'/>
</svg>">

<meta charset="UTF-8">
<title>Coven</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0f0f0e;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'EB Garamond', serif;
    color: #d6d2c8;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.15;
    pointer-events: none;
  }

  .card {
    width: 320px;
    height: 420px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px;
    cursor: pointer;
  }

  .top {
    font-size: 10px;
    letter-spacing: 0.2em;
    opacity: 0.5;
  }

  .center {
    text-align: center;
    line-height: 1.4;
  }

  .glyph {
    font-size: 28px;
    letter-spacing: 0.4em;
    font-weight: 300;
    color: #cfcbbf;

    text-shadow:
      0 1px 0 rgba(255,255,255,0.05),
      0 -1px 1px rgba(0,0,0,0.6);

    margin: 6px 0;
  }

  .bottom {
    font-size: 11px;
    line-height: 1.6;
    opacity: 0.7;
  }

  .bottom span {
    display: block;
  }

  .bottom a {
    color: #d6d2c8;
    text-decoration: none;
    transition: color 0.3s ease, text-shadow 0.3s ease;
  }

  .bottom a:hover {
    color: #f0e9dd;
    text-shadow: 0 0 6px rgba(255, 240, 210, 0.15);
  }

</style>
</head>

<body>

<div class="card">

  <div class="top">
    A practice of perception
  </div>

  <div class="center">
    <div class="glyph">RM</div>
    <div class="glyph">AE</div>
    <div class="glyph">MNO</div>
  </div>

  <div class="bottom">
    <span>Consultations</span>
    <span><a href="charm.html">Charm</a></span>
    <span>Correspondences</span>
  </div>

</div>

<script>
  const glyphEl = document.querySelectorAll(".glyph");
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

  function randomPair() {
    return letters[Math.floor(Math.random() * letters.length)] +
           letters[Math.floor(Math.random() * letters.length)];
  }

  function shuffleGlyphs() {
    glyphEl.forEach(el => {
      el.textContent = randomPair();
    });
  }

  // 🔥 1. randomize ON LOAD
  shuffleGlyphs();

  // 🔥 2. randomize ON CLICK
  document.querySelector(".card").addEventListener("click", shuffleGlyphs);
</script>

</body>
</html>
