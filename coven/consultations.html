<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <circle cx='50' cy='50' r='22' fill='%23c8a85a'/>
</svg>">

<meta charset="UTF-8">
<title>Consultations</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0f0f0e;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'EB Garamond', serif;
    color: #d6d2c8;
  }

  /* subtle paper texture */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.15;
    pointer-events: none;
  }

  .center {
    text-align: center;
    font-size: 12px;
    line-height: 1.9;
    letter-spacing: 0.05em;
    opacity: 0.75;
    max-width: 280px;
  }

  .block {
    margin-bottom: 18px;
  }

  .lang {
    opacity: 0.5;
    font-size: 10px;
    letter-spacing: 0.15em;
    margin-bottom: 10px;
  }

  /* 🧠 selection effect (disappearing text) */
  ::selection {
    background: #000;
    color: #000;
  }

</style>
</head>

<body>

<div class="center">

  <div class="block">
    <div class="lang">EN</div>
    +32 356 68 41 61<br>
    Nous répondons uniquement aux messages écrits. / We respond only to written messages.
  </div>


</div>

</body>
</html>
