<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Magazine</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    h1 {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      mix-blend-mode: difference;
      margin: 0;
    }

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000; /* keeps clean edges around image */
    }

    .issue img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* IMPORTANT: no cropping */
    }

    .label {
      position: absolute;
      bottom: 30px;
      color: white;
      font-size: 24px;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px;
      border-radius: 6px;
    }

    .issue-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

  </style>
</head>

<body>

  <h1>Poppyseeds Magazine</h1>

  <div class="container">

    <div class="issue">
      <div class="issue-wrapper">
        <img src="images/Issue01.png" alt="Issue 01">
        <div class="label">Issue 01</div>
      </div>
    </div>

    <div class="issue">
      <div class="issue-wrapper">
        <img src="images/Issue02.png" alt="Issue 02">
        <div class="label">Issue 02</div>
      </div>
    </div>

  </div>

</body>
</html>
