<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Magazine</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

  h1 {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;

  color: white;
  font-size: 18px;
  letter-spacing: 4px;
  font-weight: 300;
  text-transform: uppercase;

  opacity: 0.85;
}

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* BASE PANEL */
    .issue {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    /* LEFT ISSUE */
    .issue.left {
      justify-content: flex-start;
      padding-left: 60px;
    }

    /* RIGHT ISSUE (slightly more inward) */
    .issue.right {
      justify-content: flex-start;
      padding-left: 120px;
    }

    /* IMAGE SIZE */
    .issue img {
      max-width: 80%;
      max-height: 80%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* LABEL bottom right */
    .label {
      position: absolute;
      right: 20px;
      bottom: 20px;
      color: white;
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <h1>Poppyseeds Magazine</h1>

  <div class="container">

    <div class="issue left">
      <img src="images/Issue01.png" alt="Issue 01">
      <div class="label">Issue 01</div>
    </div>

    <div class="issue right">
      <img src="images/Issue02.png" alt="Issue 02">
      <div class="label">Issue 02</div>
    </div>

  </div>

</body>
</html>
