<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Collective</title>

  <link rel="icon" type="image/png" href="images/favicon.png">

  <meta property="og:title" content="Poppyseeds Collective">
  <meta property="og:description" content="Magazine & Collective initiated by Manuel Phil. Bischof & Artemis Xeniou">

  <meta property="og:image" content="https://raw.githubusercontent.com/USERNAME/REPO/main/images/Media-poppyseeds.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://poppyseeds.space">

  <meta name="twitter:card" content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Unbounded', sans-serif;
      background: #1a1a1a;
      cursor: none;
    }

    * { cursor: none !important; }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* 🌟 TOP LEFT NAV */
    .top-left-title {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 14px;
      font-style: italic;
      color: white;
      z-index: 2000;
      letter-spacing: -0.3px;
      display: flex;
      gap: 10px;
    }

    .top-left-title a {
      opacity: 0.9;
      transition: opacity 0.2s ease;
    }

    .top-left-title a:hover {
      opacity: 1;
    }

    /* 🌊 FLOAT */
    @keyframes softFloat {
      0%   { transform: translate(0px, 0px); }
      50%  { transform: translate(1px, -1px); }
      100% { transform: translate(0px, 0px); }
    }

    /* ⚡ SHAKE */
    @keyframes quakeShake {
      0%   { transform: translate(0px, 0px); }
      20%  { transform: translate(3px, -2px); }
      40%  { transform: translate(-3px, 2px); }
      60%  { transform: translate(2px, 3px); }
      80%  { transform: translate(-2px, -3px); }
      100% { transform: translate(0px, 0px); }
    }

    /* ================= LAYOUT ================= */

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .issue.left { padding-left: 60px; }
    .issue.right { padding-left: 120px; }

    .img-wrap {
      position: relative;
      max-width: 80%;
    }

    .img-wrap img {
      width: 100%;
      display: block;
    }

    .label {
      position: absolute;
      right: 0;
      bottom: -25px;
      color: white;
      font-size: 14px;
    }

    /* ================= MOBILE ================= */

    @media (max-width: 768px) {

      .top-left-title {
        font-size: 12px;
        left: 10px;
        top: 15px;
      }

      .container {
        flex-direction: column;
        padding-top: 120px;
        height: auto;
      }

      .issue {
        width: 100%;
        justify-content: center;
        padding: 40px 0;
      }

      .issue.left,
      .issue.right {
        padding-left: 0;
      }

      .img-wrap {
        width: 85%;
        max-width: 420px;
      }

      .label {
        position: static;
        margin-top: 10px;
        text-align: right;
      }
    }

  </style>
</head>

<body>

  <!-- 🌟 TOP LEFT NAV -->
  <div class="top-left-title">
    <a href="poppyseeds.html">poppyseeds</a>
    <span>·</span>
    <a href="about.html">collective</a>
  </div>

  <div class="container">

    <div class="issue left">
      <div class="img-wrap">
        <a href="magazines/Issue01.pdf" target="_blank">
          <img src="images/Issue01.png">
        </a>
        <div class="label">Winter '24</div>
      </div>
    </div>

    <div class="issue right">
      <div class="img-wrap">
        <a href="magazines/Issue02.pdf" target="_blank">
          <img src="images/Issue02.png">
        </a>
        <div class="label">Summer '25</div>
      </div>
    </div>

  </div>

  <script>
    document.addEventListener("mousemove", (e) => {
      const dot = document.createElement("div");
      document.body.appendChild(dot);

      dot.style.position = "fixed";
      dot.style.left = e.clientX + "px";
      dot.style.top = e.clientY + "px";
      dot.style.width = "10px";
      dot.style.height = "10px";
      dot.style.borderRadius = "50%";
      dot.style.pointerEvents = "none";
      dot.style.transform = "translate(-50%, -50%)";
      dot.style.background = "#39ff14";
      dot.style.boxShadow = "0 0 8px #39ff14";

      dot.style.opacity = "1";
      dot.style.transition = "opacity 0.8s ease-out";

      setTimeout(() => dot.style.opacity = "0", 10);
      setTimeout(() => dot.remove(), 800);
    });
  </script>

</body>
</html>
