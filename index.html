<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Collective</title>

  <!-- 🌟 NEON DOT FAVICON -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'>
      <circle cx='32' cy='32' r='10' fill='%2339ff14'/>
    </svg>">

  <meta property="og:title" content="Poppyseeds Collective">
  <meta property="og:description" content="Magazine & Collective initiated by Manuel Phil. Bischof & Artemis Xeniou">
  <meta property="og:image" content="https://raw.githubusercontent.com/USERNAME/REPO/main/images/Media-poppyseeds.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://poppyseeds.space">
  <meta name="twitter:card" content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Unbounded', sans-serif;
      background: #1a1a1a;
      cursor: none;
    }

    * { cursor: none !important; }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ================= TOP NAV ================= */

    .top-left-title {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 16px;
      font-style: italic;
      z-index: 2000;
      display: flex;
      gap: 10px;
      letter-spacing: -0.3px;
    }

    .top-left-title a {
      color: white;
      position: relative;
    }

    /* ✨ local purple hover */
    .top-left-title a::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      color: #b56cff;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }

    .top-left-title a:hover::after {
      opacity: 1;
    }

    /* ================= LAYOUT ================= */

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .issue.left { padding-left: 60px; }
    .issue.right { padding-left: 120px; }

    .img-wrap {
      position: relative;
      max-width: 80%;
    }

    .img-wrap img {
      width: 100%;
      display: block;
    }

    .label {
      position: absolute;
      right: 0;
      bottom: -20px;
      color: white;
      font-size: 11px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <!-- 🌟 GLOBAL NAV -->
  <div class="top-left-title">
    <a data-text="poppyseeds" href="index.html">poppyseeds</a>
    <span style="color:white;">·</span>
    <a data-text="collective" href="about.html">collective</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">

    <div class="issue left">
      <div class="img-wrap">
        <a href="magazines/Issue01.pdf" target="_blank">
          <img src="images/Issue01.png">
        </a>
        <div class="label">Winter '24</div>
      </div>
    </div>

    <div class="issue right">
      <div class="img-wrap">
        <a href="magazines/Issue02.pdf" target="_blank">
          <img src="images/Issue02.png">
        </a>
        <div class="label">Summer '25</div>
      </div>
    </div>

  </div>

  <!-- 🟢 NEON CURSOR -->
  <script>
    document.addEventListener("mousemove", (e) => {
      const dot = document.createElement("div");
      document.body.appendChild(dot);

      dot.style.position = "fixed";
      dot.style.left = e.clientX + "px";
      dot.style.top = e.clientY + "px";
      dot.style.width = "8px";
      dot.style.height = "8px";
      dot.style.borderRadius = "50%";
      dot.style.pointerEvents = "none";
      dot.style.transform = "translate(-50%, -50%)";

      dot.style.background = "#39ff14";
      dot.style.boxShadow = "0 0 10px #39ff14, 0 0 20px #39ff14";
      dot.style.zIndex = "999999";

      dot.style.opacity = "1";
      dot.style.transition = "opacity 0.8s ease-out";

      setTimeout(() => {
        dot.style.opacity = "0";
      }, 10);

      setTimeout(() => {
        dot.remove();
      }, 800);
    });
  </script>

</body>
</html>
