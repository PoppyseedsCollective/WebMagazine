<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Magazine</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    h1 {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      mix-blend-mode: difference;
      margin: 0;
    }

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .issue img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* BOTTOM RIGHT LABEL (NO BACKGROUND) */
    .label {
      position: absolute;
      right: 20px;
      bottom: 20px;
      color: white;
      font-size: 14px;
      letter-spacing: 1px;
    }

  </style>
</head>

<body>

  <h1>Poppyseeds Magazine</h1>

  <div class="container">

    <div class="issue">
      <img src="images/Issue01.png" alt="Issue 01">
      <div class="label">Issue 01</div>
    </div>

    <div class="issue">
      <img src="images/Issue02.png" alt="Issue 02">
      <div class="label">Issue 02</div>
    </div>

  </div>

</body>
</html>
