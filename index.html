<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Collective</title>

  <!-- 🔤 FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Unbounded', sans-serif;
      background: #111;
      cursor: none;
    }

    * {
      cursor: none !important;
    }

    /* 🌊 SOFT IDLE MOVEMENT */
    @keyframes softFloat {
      0%   { transform: translate(0px, 0px); }
      50%  { transform: translate(1px, -1px); }
      100% { transform: translate(0px, 0px); }
    }

    /* ⚡ STRONG SHAKE BURST */
    @keyframes quakeShake {
      0%   { transform: translate(0px, 0px); }
      20%  { transform: translate(3px, -2px); }
      40%  { transform: translate(-3px, 2px); }
      60%  { transform: translate(2px, 3px); }
      80%  { transform: translate(-2px, -3px); }
      100% { transform: translate(0px, 0px); }
    }

    .title {
      position: fixed;
      top: 0px;
      left: 0px;

      font-size: 120px;
      font-weight: 300;
      letter-spacing: -1px;

      color: white;
      mix-blend-mode: difference;

      pointer-events: none;
      z-index: 1000;

      animation: softFloat 3s infinite ease-in-out;
    }

    /* when burst happens */
    .title.shake {
      animation: quakeShake 0.4s steps(2, end);
    }

    /* DESKTOP */
    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .issue.left {
      padding-left: 60px;
    }

    .issue.right {
      padding-left: 120px;
    }

    .img-wrap {
      position: relative;
      max-width: 80%;
    }

    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    .label {
      position: absolute;
      right: 0;
      bottom: -25px;
      color: white;
      font-size: 14px;
    }

    /* 📱 MOBILE */
    @media (max-width: 768px) {

      body {
        overflow-y: auto;
      }

      .title {
        font-size: 48px;
        top: 20px;
        left: 20px;
      }

      .container {
        flex-direction: column;
        height: auto;
        padding-top: 120px;
      }

      .issue {
        width: 100%;
        justify-content: center;
        padding: 40px 0;
      }

      .issue.left,
      .issue.right {
        padding-left: 0;
      }

      .img-wrap {
        width: 85%;
        max-width: 420px;
      }

      .label {
        position: static;
        margin-top: 10px;
        text-align: right;
      }
    }

  </style>
</head>

<body>

  <div class="title" id="title">Poppyseeds Magazine</div>

  <div class="container">

    <div class="issue left">
      <div class="img-wrap">
        <a href="magazines/Issue01.pdf" target="_blank">
          <img src="images/Issue01.png">
        </a>
        <div class="label">Issue 01</div>
      </div>
    </div>

    <div class="issue right">
      <div class="img-wrap">
        <a href="magazines/Issue02.pdf" target="_blank">
          <img src="images/Issue02.png">
        </a>
        <div class="label">Issue 02</div>
      </div>
    </div>

  </div>

  <!-- 🟢 CURSOR + RANDOM SHAKE -->
  <script>
    document.addEventListener("mousemove", (e) => {

      const dot = document.createElement("div");
      document.body.appendChild(dot);

      dot.style.position = "fixed";
      dot.style.left = e.clientX + "px";
      dot.style.top = e.clientY + "px";

      dot.style.width = "10px";
      dot.style.height = "10px";
      dot.style.borderRadius = "50%";
      dot.style.pointerEvents = "none";
      dot.style.transform = "translate(-50%, -50%)";

      dot.style.background = "#39ff14";
      dot.style.boxShadow = "0 0 8px #39ff14";

      dot.style.opacity = "1";
      dot.style.transition = "opacity 0.8s ease-out";

      setTimeout(() => dot.style.opacity = "0", 10);
      setTimeout(() => dot.remove(), 800);
    });

    /* ⚡ RANDOM BURST ON TOP OF SOFT FLOAT */
    const title = document.getElementById("title");

    function triggerShake() {
      title.classList.add("shake");

      setTimeout(() => {
        title.classList.remove("shake");
        scheduleNext();
      }, 400);
    }

    function scheduleNext() {
      const delay = 2000 + Math.random() * 2000;
      setTimeout(triggerShake, delay);
    }

    scheduleNext();
  </script>

</body>
</html>
