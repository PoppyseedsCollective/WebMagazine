<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Collective</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      cursor: none;
    }

    * {
      cursor: none !important;
    }

    /* ⚡ STRONGER + FASTER SHAKE */
    @keyframes fastShake {
      0%   { transform: translate(0px, 0px); }
      10%  { transform: translate(2px, -2px); }
      20%  { transform: translate(-2px, 2px); }
      30%  { transform: translate(2px, 2px); }
      40%  { transform: translate(-2px, -2px); }
      50%  { transform: translate(3px, 0px); }
      60%  { transform: translate(-3px, 1px); }
      70%  { transform: translate(2px, -1px); }
      80%  { transform: translate(-1px, 2px); }
      90%  { transform: translate(1px, -2px); }
      100% { transform: translate(0px, 0px); }
    }

    .title {
      position: fixed;
      top: 30px;
      left: 0px;

      font-size: 130px;
      font-weight: 10;

      color: white;
      mix-blend-mode: difference;

      pointer-events: none;
      z-index: 1000;

      animation: fastShake 1.2s infinite;
    }

    /* DESKTOP */
    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .issue.left {
      justify-content: flex-start;
      padding-left: 60px;
    }

    .issue.right {
      justify-content: flex-start;
      padding-left: 120px;
    }

    .img-wrap {
      position: relative;
      max-width: 80%;
      max-height: 80%;
    }

    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .label {
      position: absolute;
      right: 0;
      bottom: -25px;

      color: white;
      font-size: 14px;
      opacity: 0.85;
      pointer-events: none;
    }

    /* 📱 MOBILE FIX (IMPORTANT PART) */
    @media (max-width: 768px) {

      html, body {
        overflow-y: auto !important;
        overflow-x: hidden;
      }

      .title {
        font-size: 48px;
        top: 20px;
        left: 20px;
      }

      .container {
        display: flex !important;
        flex-direction: column !important;
        height: auto !important;
        padding-top: 120px;
      }

      .issue {
        width: 100% !important;
        display: flex !important;
        justify-content: center !important;
        padding: 30px 0;
      }

      .issue.left,
      .issue.right {
        padding-left: 0 !important;
      }

      .img-wrap {
        width: 85%;
        max-width: 420px;
      }

      .label {
        position: static;
        margin-top: 10px;
        text-align: right;
        width: 85%;
        max-width: 420px;
      }
    }

  </style>
</head>

<body>

  <div class="title">Poppyseeds Magazine</div>

  <div class="container">

    <div class="issue left">
      <div class="img-wrap">
        <a href="magazines/Issue01.pdf" target="_blank">
          <img src="images/Issue01.png">
        </a>
        <div class="label">Issue 01</div>
      </div>
    </div>

    <div class="issue right">
      <div class="img-wrap">
        <a href="magazines/Issue02.pdf" target="_blank">
          <img src="images/Issue02.png">
        </a>
        <div class="label">Issue 02</div>
      </div>
    </div>

  </div>

  <!-- NEON CURSOR -->
  <script>
    document.addEventListener("mousemove", (e) => {

      const dot = document.createElement("div");
      document.body.appendChild(dot);

      dot.style.position = "fixed";
      dot.style.left = e.clientX + "px";
      dot.style.top = e.clientY + "px";

      dot.style.width = "10px";
      dot.style.height = "10px";
      dot.style.borderRadius = "50%";
      dot.style.pointerEvents = "none";
      dot.style.zIndex = "9999";
      dot.style.transform = "translate(-50%, -50%)";

      dot.style.background = "#39ff14";
      dot.style.boxShadow = "0 0 8px #39ff14, 0 0 16px #39ff14";

      dot.style.opacity = "1";
      dot.style.transition = "opacity 0.8s ease-out";

      setTimeout(() => {
        dot.style.opacity = "0";
      }, 10);

      setTimeout(() => {
        dot.remove();
      }, 800);
    });
  </script>

</body>
</html>
