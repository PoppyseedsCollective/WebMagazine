<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Magazine</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      cursor: none; /* hide default cursor */
    }

    /* FULL WIDTH TITLE */
    h1 {
      position: fixed;
      top: 30px;
      left: 0;
      width: 100vw;

      text-align: center;

      font-size: 20px;
      letter-spacing: 6px;
      font-weight: 300;
      text-transform: uppercase;

      color: white;
      mix-blend-mode: difference;

      z-index: 1000;
      pointer-events: none;
    }

    /* PINK CURSOR */
    .cursor {
      width: 10px;
      height: 10px;
      background: pink;
      border-radius: 50%;
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* LAYOUT */
    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .issue.left {
      justify-content: flex-start;
      padding-left: 60px;
    }

    .issue.right {
      justify-content: flex-start;
      padding-left: 120px;
    }

    /* IMAGE SIZE */
    .issue img {
      max-width: 80%;
      max-height: 80%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* LABEL */
    .label {
      position: absolute;
      right: 20px;
      bottom: 20px;
      color: white;
      font-size: 14px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <h1>Poppyseeds Magazine</h1>

  <div class="cursor"></div>

  <div class="container">

    <div class="issue left">
      <img src="images/Issue01.png" alt="Issue 01">
      <div class="label">Issue 01</div>
    </div>

    <div class="issue right">
      <img src="images/Issue02.png" alt="Issue 02">
      <div class="label">Issue 02</div>
    </div>

  </div>

  <script>
    const cursor = document.querySelector(".cursor");

    document.addEventListener("mousemove", (e) => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });
  </script>

</body>
</html>
