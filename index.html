<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Collective</title>

  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'>
      <circle cx='32' cy='32' r='10' fill='%2339ff14'/>
    </svg>">

  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Unbounded', sans-serif;
      background: #1a1a1a;
      cursor: none;
    }

    * { cursor: none !important; }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ================= TOP NAV ================= */

    .top-left-title {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 16px;
      font-style: italic;
      z-index: 3000;
      display: flex;
      gap: 10px;
      letter-spacing: -0.3px;
      pointer-events: auto;
    }

    .top-left-title a {
      color: white;
      position: relative;
      pointer-events: auto;
    }

    .top-left-title span {
      color: white;
    }

    /* ================= LAYOUT ================= */

    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .issue.left { padding-left: 60px; }
    .issue.right { padding-left: 120px; }

    .img-wrap {
      position: relative;
      max-width: 80%;
    }

    .img-wrap img {
      width: 100%;
      display: block;
    }

    .label {
      position: absolute;
      right: 0;
      bottom: -20px;
      color: white;
      font-size: 11px;
      opacity: 0.8;
    }

    /* ================= CURSOR ================= */

    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #39ff14;
      box-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 999999;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    /* cursor turns purple on nav hover */
    .hovering-nav .cursor {
      background: #b56cff;
      box-shadow: 0 0 12px #b56cff, 0 0 24px #b56cff;
    }

    /* ================= CREDIT ================= */

    .credit {
      position: fixed;
      right: 20px;
      bottom: 20px;
      writing-mode: vertical-rl;
      transform: rotate(180deg);

      font-size: 9px; /* ⬅ smaller */
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.5px;

      z-index: 3000;
      user-select: none;
      pointer-events: none;
    }

  </style>
</head>

<body>

  <!-- 🌟 NAV -->
  <div class="top-left-title">
    <a href="index.html" data-text="poppyseeds">poppyseeds</a>
    <span>·</span>
    <a href="about.html" data-text="collective">collective</a>
  </div>

  <!-- 🟢 CURSOR -->
  <div class="cursor"></div>

  <!-- MAIN -->
  <div class="container">

    <div class="issue left">
      <div class="img-wrap">
        <a href="magazines/Issue01.pdf" target="_blank">
          <img src="images/Issue01.png">
        </a>
        <div class="label">Winter '24</div>
      </div>
    </div>

    <div class="issue right">
      <div class="img-wrap">
        <a href="magazines/Issue02.pdf" target="_blank">
          <img src="images/Issue02.png">
        </a>
        <div class="label">Summer '25</div>
      </div>
    </div>

  </div>

  <!-- 📎 CREDIT -->
  <div class="credit">
    built by Manuel Phil. Bischof.
  </div>

  <script>
    const cursor = document.querySelector(".cursor");

    document.addEventListener("mousemove", (e) => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });

    // 🟣 cursor turns purple over nav
    const nav = document.querySelector(".top-left-title");

    nav.addEventListener("mouseenter", () => {
      document.body.classList.add("hovering-nav");
    });

    nav.addEventListener("mouseleave", () => {
      document.body.classList.remove("hovering-nav");
    });
  </script>

</body>
</html>
