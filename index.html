<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Magazine</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
      font-family: Arial, sans-serif;
    }

    h1 {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      mix-blend-mode: difference;
    }

    /* FULLSCREEN SECTIONS */
    .issue {
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    .issue img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* fills screen */
    }

    .label {
      position: absolute;
      bottom: 30px;
      left: 30px;
      color: white;
      font-size: 24px;
      background: rgba(0,0,0,0.4);
      padding: 10px 15px;
      border-radius: 8px;
    }

    /* optional scroll hint */
    .hint {
      position: fixed;
      bottom: 20px;
      right: 20px;
      color: white;
      mix-blend-mode: difference;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>Poppyseeds Magazine</h1>
  <div class="hint">Scroll ↓</div>

  <section class="issue">
    <img src="images/Issue01.png">
    <div class="label">Issue 01</div>
  </section>

  <section class="issue">
    <img src="images/Issue02.png">
    <div class="label">Issue 02</div>
  </section>

</body>
</html>
