<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Magazine</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      cursor: none;
    }

    /* 🚫 FORCE NO HAND CURSOR ANYWHERE */
    * {
      cursor: none !important;
    }

    /* TITLE */
    .title {
      position: fixed;
      top: 30px;
      left: 20px;

      font-size: 80px;
      font-weight: 300;

      color: white;
      mix-blend-mode: difference;

      pointer-events: none;
      z-index: 1000;
    }

    /* LAYOUT */
    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .issue.left {
      justify-content: flex-start;
      padding-left: 60px;
    }

    .issue.right {
      justify-content: flex-start;
      padding-left: 120px;
    }

    .img-wrap {
      position: relative;
      max-width: 80%;
      max-height: 80%;
    }

    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .label {
      position: absolute;
      right: 0;
      bottom: -25px;

      color: white;
      font-size: 14px;
      opacity: 0.85;
      pointer-events: none;
    }

  </style>
</head>

<body>

  <div class="title">Poppyseeds Magazine</div>

  <div class="container">

    <div class="issue left">
      <div class="img-wrap">
        <a href="magazines/Issue01.pdf" target="_blank">
          <img src="images/Issue01.png">
        </a>
        <div class="label">Issue 01</div>
      </div>
    </div>

    <div class="issue right">
      <div class="img-wrap">
        <a href="magazines/Issue02.pdf" target="_blank">
          <img src="images/Issue02.png">
        </a>
        <div class="label">Issue 02</div>
      </div>
    </div>

  </div>

  <!-- ✨ NEON GREEN CURSOR -->
  <script>
    const dot = document.createElement("div");
    document.body.appendChild(dot);

    dot.style.position = "fixed";
    dot.style.width = "12px";
    dot.style.height = "12px";
    dot.style.borderRadius = "50%";
    dot.style.pointerEvents = "none";
    dot.style.zIndex = "9999";
    dot.style.transform = "translate(-50%, -50%)";

    /* 🌟 NEON GLOW STYLE */
    dot.style.background = "#39ff14";
    dot.style.boxShadow = "0 0 10px #39ff14, 0 0 20px #39ff14";

    document.addEventListener("mousemove", (e) => {
      dot.style.left = e.clientX + "px";
      dot.style.top = e.clientY + "px";
    });
  </script>

</body>
</html>
