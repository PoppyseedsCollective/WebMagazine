<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Poppyseeds Magazine</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* prevents scrolling */
      font-family: Arial, sans-serif;
    }

    h1 {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      mix-blend-mode: difference;
      margin: 0;
    }

    /* FULL SCREEN ROW */
    .container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .issue {
      flex: 1; /* each takes half screen */
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .issue img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* fills full panel */
      transition: transform 0.3s ease;
    }

    .issue:hover img {
      transform: scale(1.03);
    }

    .label {
      position: absolute;
      bottom: 30px;
      left: 30px;
      color: white;
      font-size: 28px;
      background: rgba(0,0,0,0.4);
      padding: 10px 15px;
      border-radius: 8px;
    }

  </style>
</head>

<body>

  <h1>Poppyseeds Magazine</h1>

  <div class="container">

    <div class="issue">
      <img src="images/Issue01.png" alt="Issue 01">
      <div class="label">Issue 01</div>
    </div>

    <div class="issue">
      <img src="images/Issue02.png" alt="Issue 02">
      <div class="label">Issue 02</div>
    </div>

  </div>

</body>
</html>
