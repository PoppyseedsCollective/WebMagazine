<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Issue 02</title>

  <!-- Favicon placeholder -->
  <link id="favicon" rel="icon" type="image/png" href="">

  <script>
    // Create a 32x32 canvas for favicon
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');

    // Draw a soft gray circle
    ctx.fillStyle = '#9a9a9a';  // soft gray
    ctx.beginPath();
    ctx.arc(16, 16, 10, 0, Math.PI * 2); // center 16,16, radius 10
    ctx.fill();

    // Set the canvas as favicon
    document.getElementById('favicon').href = canvas.toDataURL('image/png');
  </script>
</head>

<body>

  <a href="index.html">← Back</a>

  <h1>Issue 02</h1>

  <iframe 
    src="magazines/Issue02.pdf" 
    width="100%" 
    height="800px">
  </iframe>

</body>
</html>
