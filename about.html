<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>About — Poppyseeds</title>

  <!-- 🔤 FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: white;
      font-family: 'Unbounded', sans-serif;
      cursor: none;
      height: 100%;
    }

    * {
      cursor: none !important;
    }

    /* LAYOUT */
    .wrapper {
      max-width: 700px;
      padding: 80px 40px;
    }

    .title {
      font-size: 42px;
      font-weight: 300;
      margin-bottom: 40px;
    }

    .text {
      font-size: 12px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .text p {
      margin-bottom: 20px;
    }

    /* BACK LINK */
    .back {
      position: fixed;
      top: 30px;
      right: 30px;
      font-size: 30px;
      opacity: 0.7;
      text-decoration: none;
      color: white;
    }

    .back:hover {
      opacity: 1;
    }

  </style>
</head>

<body>

  <!-- BACK -->
  <a href="index.html" class="back">←</a>

  <div class="wrapper">

    <div class="title">Poppyseeds Magazine & Collective</div>
    <div class="text">
      <p>initied by Manuel Phil. Bischof & Artemis Xeniou, The Hague, NL</p>
    </div>

  </div>

  <!-- 🟢 NEON CURSOR TRAIL -->
  <script>
    document.addEventListener("mousemove", (e) => {

      const dot = document.createElement("div");
      document.body.appendChild(dot);

      dot.style.position = "fixed";
      dot.style.left = e.clientX + "px";
      dot.style.top = e.clientY + "px";

      dot.style.width = "10px";
      dot.style.height = "10px";
      dot.style.borderRadius = "50%";
      dot.style.pointerEvents = "none";
      dot.style.transform = "translate(-50%, -50%)";
      dot.style.zIndex = "9999";

      dot.style.background = "#39ff14";
      dot.style.boxShadow = "0 0 8px #39ff14, 0 0 16px #39ff14";

      dot.style.opacity = "1";
      dot.style.transition = "opacity 0.8s ease-out";

      setTimeout(() => dot.style.opacity = "0", 10);
      setTimeout(() => dot.remove(), 800);
    });
  </script>

</body>
</html>
