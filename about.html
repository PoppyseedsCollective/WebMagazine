<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>About — Poppyseeds</title>

  <!-- 🌸 SOFT PURPLE FAVICON -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' width='64' height='64'>
      <defs>
        <radialGradient id='g' cx='50%' cy='50%' r='50%'>
          <stop offset='0%' stop-color='#d6b3ff'/>
          <stop offset='60%' stop-color='#b56cff'/>
          <stop offset='100%' stop-color='#7a4bd6'/>
        </radialGradient>
      </defs>
      <circle cx='32' cy='32' r='10' fill='url(%23g)' />
    </svg>">

  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    ::selection {
      background: white;
      color: white;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      color: white;
      font-family: 'Unbounded', sans-serif;
      cursor: none;
      height: 100%;
    }

    * { cursor: none !important; }

    /* ================= NAV ================= */

    .top-left-title {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 16px;
      font-style: italic;
      z-index: 3000;
      display: flex;
      gap: 10px;
    }

    .top-left-title a {
      color: white;
      position: relative;
      text-decoration: none;
    }

    .top-left-title a::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      color: #b56cff;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }

    .top-left-title a:hover::after {
      opacity: 1;
    }

    /* ================= CONTENT ================= */

    .wrapper {
      max-width: 700px;
      padding: 110px 40px;
    }

    .title {
      font-size: 25px;
      font-weight: 300;
      margin-bottom: 40px;
      white-space: pre-line;
    }

    .text {
      font-size: 12px;
      line-height: 1.6;
      opacity: 0.9;
    }

    .ig {
      color: white;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .ig:hover {
      color: #b56cff;
      transform: scale(1.05);
    }

    /* ================= CURSOR ================= */

    .cursor {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #39ff14;
      box-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }

    /* purple hover over text */
    .hover-text .cursor {
      background: #b56cff;
      box-shadow: 0 0 10px #b56cff, 0 0 20px #b56cff;
    }

  </style>
</head>

<body>

  <!-- 🌟 NAV -->
  <div class="top-left-title">
    <a href="index.html" data-text="poppyseeds">poppyseeds</a>
    <span>·</span>
    <a href="index.html" data-text="collective">collective</a>
  </div>

  <!-- 🟢 CURSOR BASE -->
  <div class="cursor"></div>

  <!-- CONTENT -->
  <div class="wrapper">

    <div class="title">
The difficulty of our times has been (as it always has) a defining force for our 
generation’s evolvement...
    </div>

    <div class="text">
      <p>
        Poppyseeds Magazine & Collective initiated by
        <a class="ig" href="https://www.instagram.com/manuel.phil.bischof/" target="_blank">Manuel Phil. Bischof</a>
        &
        <a class="ig" href="https://www.instagram.com/artemis.x19/" target="_blank">Artemis Xeniou</a>,
        The Hague, 2024
      </p>
    </div>

  </div>

  <!-- 🟢 REAL CURSOR TRAIL (FIXED) -->
  <script>
    const cursor = document.querySelector(".cursor");

    document.addEventListener("mousemove", (e) => {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";

      const dot = document.createElement("div");
      document.body.appendChild(dot);

      dot.style.position = "fixed";
      dot.style.left = e.clientX + "px";
      dot.style.top = e.clientY + "px";
      dot.style.width = "10px";
      dot.style.height = "10px";
      dot.style.borderRadius = "50%";
      dot.style.background = "#39ff14";
      dot.style.boxShadow = "0 0 10px #39ff14";
      dot.style.pointerEvents = "none";
      dot.style.transform = "translate(-50%, -50%)";
      dot.style.zIndex = "9998";

      dot.style.opacity = "1";
      dot.style.transition = "opacity 0.8s ease-out, transform 0.8s ease-out";

      setTimeout(() => {
        dot.style.opacity = "0";
        dot.style.transform = "translate(-50%, -50%) scale(0.5)";
      }, 10);

      setTimeout(() => {
        dot.remove();
      }, 800);
    });

    // purple cursor over text
    const textLinks = document.querySelectorAll(".ig");

    textLinks.forEach(link => {
      link.addEventListener("mouseenter", () => {
        document.body.classList.add("hover-text");
      });

      link.addEventListener("mouseleave", () => {
        document.body.classList.remove("hover-text");
      });
    });
  </script>

</body>
</html>
